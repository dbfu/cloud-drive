# TC-FILE-008 上传文件-类型限制
# file 模块 - 测试用例

id: TC-FILE-008
title: 上传文件-类型限制
version: 1.0
priority: P1
module: file
tags: [upload, type-limit, api, validation, security]

created_at: 2026-05-29
updated_at: 2026-05-29
status: active

history:
  - version: 1.0
    date: 2026-05-29
    author: 测试
    change: 初始创建

related_issues:
  - https://github.com/dbfu/cloud-drive/issues/3

preconditions:
  - 后端服务正常运行
  - 用户已登录获取Token

test_data:
  supported_types:
    - jpg, jpeg, png, gif, webp (images)
    - mp4, webm, mov (videos)
    - pdf, doc, docx, xls, xlsx, ppt, pptx, txt (documents)
  unsupported_types:
    - exe, bat, sh, js, php (executable/scripts)

steps:
  - action: 上传不支持的文件类型（如.exe）
    request:
      method: POST
      url: /api/files/upload
      headers:
        Authorization: "Bearer {token}"
        Content-Type: "multipart/form-data"
      body:
        file: "malicious.exe"
    expected:
      status: 200
      code: 3004
      message: "文件类型不支持"
      data: null

  - action: 上传脚本文件（如.js）
    request:
      method: POST
      url: /api/files/upload
      headers:
        Authorization: "Bearer {token}"
      body:
        file: "script.js"
    expected:
      code: 3004 或 归类为other并保存

  - action: 验证文件类型检测
    description: 上传伪装扩展名的文件（如.exe改名为.jpg）
    request:
      method: POST
      url: /api/files/upload
      headers:
        Authorization: "Bearer {token}"
      body:
        file: "fake.jpg (实际是exe内容)"
    expected:
      - 检测实际内容类型
      - 拒绝或正确分类

expected_results:
  - 不支持类型被正确拒绝或分类为other
  - 安全检测防止恶意文件上传
  - MIME类型检测生效

assertions:
  - type: security
    description: 文件类型限制生效
    validate:
      - 危险文件类型被拒绝
      - 类型检测不只依赖扩展名