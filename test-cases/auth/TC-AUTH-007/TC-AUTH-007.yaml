# TC-AUTH-007 JWT Token验证
# auth 模块 - 测试用例

id: TC-AUTH-007
title: JWT Token验证
version: 1.0
priority: P0
module: auth
tags: [jwt, authentication, api, security]

created_at: 2026-05-29
updated_at: 2026-05-29
status: active

history:
  - version: 1.0
    date: 2026-05-29
    author: 测试
    change: 初始创建

related_issues:
  - https://github.com/dbfu/cloud-drive/issues/1

preconditions:
  - 后端服务正常运行
  - 已获取有效JWT Token
  - 已获取过期JWT Token（用于测试）

test_scenarios:
  - name: 有效Token请求
    description: 使用有效Token请求认证接口
    expected:
      code: 0
      正确返回用户信息

  - name: 无Token请求
    description: 不携带Token请求需要认证的接口
    expected:
      code: 1002
      message: "认证失败"

  - name: 过期Token请求
    description: 使用过期Token请求认证接口
    expected:
      code: 1002
      message: "认证失败" 或 "Token已过期"

  - name: 无效Token请求
    description: 使用无效格式Token请求
    expected:
      code: 1002
      message: "认证失败"

  - name: Token格式错误
    description: Authorization header格式错误
    expected:
      code: 1002

steps:
  - action: 测试有效Token
    request:
      method: GET
      url: /api/auth/me
      headers:
        Authorization: "Bearer {valid_token}"
    expected:
      code: 0
      返回用户信息

  - action: 测试无Token
    request:
      method: GET
      url: /api/auth/me
    expected:
      code: 1002

  - action: 测试过期Token
    request:
      method: GET
      url: /api/auth/me
      headers:
        Authorization: "Bearer {expired_token}"
    expected:
      code: 1002

  - action: 测试无效Token
    request:
      method: GET
      url: /api/auth/me
      headers:
        Authorization: "Bearer invalid_token_string"
    expected:
      code: 1002

  - action: 测试访问他人文件
    description: 使用A用户Token访问B用户文件
    request:
      method: GET
      url: /api/files/{other_user_file_id}
      headers:
        Authorization: "Bearer {user_a_token}"
    expected:
      code: 1003 或 3001
      message: "权限不足" 或 "文件不存在"

expected_results:
  - Token认证机制正常工作
  - 各种异常情况正确处理
  - 权限隔离正确实现

assertions:
  - type: authentication
    description: Token验证正确
    validate:
      - 有效Token请求成功
      - 无效Token返回1002
      - 过期Token返回1002

  - type: authorization
    description: 权限隔离正确
    validate:
      - 不能访问他人文件
      - 返回权限不足错误