# TC-AUTH-006 用户登录-用户不存在
# auth 模块 - 测试用例

id: TC-AUTH-006
title: 用户登录-用户不存在
version: 1.0
priority: P1
module: auth
tags: [login, error, api, security]

created_at: 2026-05-29
updated_at: 2026-05-29
status: active

history:
  - version: 1.0
    date: 2026-05-29
    author: 测试
    change: 初始创建

related_issues:
  - https://github.com/dbfu/cloud-drive/issues/1

preconditions:
  - 后端服务正常运行
  - 数据库中不存在用户 "nonexistentuser"

test_data:
  username: "nonexistentuser"
  password: "TestPass123!"

steps:
  - action: 发送登录请求使用不存在用户
    request:
      method: POST
      url: /api/auth/login
      body:
        username: "nonexistentuser"
        password: "TestPass123!"
    expected:
      status: 200
      code: 2002
      message: "用户名或密码错误"
      data: null

  - action: 前端登录页面测试
    expected:
      - 显示"用户名或密码错误"提示
      - 用户停留在登录页面

expected_results:
  - 返回错误码2002（与密码错误相同）
  - 不泄露用户是否存在信息
  - 安全性保护

assertions:
  - type: api_response
    description: 返回统一错误响应
    validate:
      - response.body.code === 2002
      - response.body.message === "用户名或密码错误"
      - response.body.data === null

  - type: security
    description: 不泄露用户存在信息
    validate:
      - 错误码与密码错误相同
      - 不提示"用户不存在"