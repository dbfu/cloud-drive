# TC-AUTH-005 用户登录-错误密码
# auth 模块 - 测试用例

id: TC-AUTH-005
title: 用户登录-错误密码
version: 1.0
priority: P1
module: auth
tags: [login, error, api, security]

created_at: 2026-05-29
updated_at: 2026-05-29
status: active

history:
  - version: 1.0
    date: 2026-05-29
    author: 测试
    change: 初始创建

related_issues:
  - https://github.com/dbfu/cloud-drive/issues/1

preconditions:
  - 后端服务正常运行
  - 数据库中已存在测试用户 "testloginuser"

test_data:
  username: "testloginuser"
  password: "WrongPassword123!"

steps:
  - action: 发送登录请求使用错误密码
    request:
      method: POST
      url: /api/auth/login
      body:
        username: "testloginuser"
        password: "WrongPassword123!"
    expected:
      status: 200
      code: 2002
      message: "用户名或密码错误"
      data: null

  - action: 前端登录页面测试
    expected:
      - 显示"用户名或密码错误"提示
      - 用户停留在登录页面
      - 不返回Token

expected_results:
  - 返回错误码2002
  - 不泄露具体是用户名错误还是密码错误
  - 前端显示统一错误提示

assertions:
  - type: api_response
    description: 返回密码错误响应
    validate:
      - response.body.code === 2002
      - response.body.message === "用户名或密码错误"
      - response.body.data === null

  - type: security
    description: 安全性验证
    validate:
      - 错误提示不区分用户名或密码错误
      - 不返回任何Token