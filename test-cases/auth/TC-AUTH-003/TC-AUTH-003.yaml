# TC-AUTH-003 用户注册-参数校验
# auth 模块 - 测试用例

id: TC-AUTH-003
title: 用户注册-参数校验
version: 1.0
priority: P1
module: auth
tags: [registration, validation, api, boundary]

created_at: 2026-05-29
updated_at: 2026-05-29
status: active

history:
  - version: 1.0
    date: 2026-05-29
    author: 测试
    change: 初始创建

related_issues:
  - https://github.com/dbfu/cloud-drive/issues/1

preconditions:
  - 后端服务正常运行

test_scenarios:
  - name: 用户名过短
    data:
      username: "ab"
      password: "TestPass123!"
    expected:
      code: 1001
      message: "用户名长度需在3-50字符之间"

  - name: 用户名过长
    data:
      username: "abcdefghijklmnopqrstuvwxyz12345678901234567890123456789012345678901234567890"
      password: "TestPass123!"
    expected:
      code: 1001
      message: "用户名长度需在3-50字符之间"

  - name: 密码过短
    data:
      username: "testuser003"
      password: "12345"
    expected:
      code: 1001
      message: "密码长度需在6-100字符之间"

  - name: 密码过长
    data:
      username: "testuser003"
      password: "abcdefghijklmnopqrstuvwxyz1234567890abcdefghijklmnopqrstuvwxyz1234567890abcdefghijklmnopqrstuvwxyz12345678901234567890"
    expected:
      code: 1001
      message: "密码长度需在6-100字符之间"

  - name: 用户名缺失
    data:
      username: null
      password: "TestPass123!"
    expected:
      code: 1001
      message: "用户名不能为空"

  - name: 密码缺失
    data:
      username: "testuser003"
      password: null
    expected:
      code: 1001
      message: "密码不能为空"

steps:
  - action: 发送各种参数校验测试请求
    expected:
      - 返回对应错误码1001
      - 返回对应错误提示
      - 前端显示参数错误提示

expected_results:
  - 所有边界条件被正确校验
  - 返回统一错误码1001
  - 错误提示清晰明确

assertions:
  - type: api_response
    description: 参数校验返回正确错误
    validate:
      - response.body.code === 1001
      - response.body.message包含具体校验失败原因